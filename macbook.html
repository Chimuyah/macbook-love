<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="shortcut icon"
      href="https://www.iconpacks.net/icons/1/free-heart-icon-431-thumb.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="styles.css" />
    <title>macbook ka</title>
  </head>
  <body>
  <style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    background:linear-gradient(135deg,#1f8563,#fff5f9);
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    text-align:center;
    background:rgb(255, 255, 255);
    padding:30px;
    border-radius:25px;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
    max-width:700px;
    width:90%;
}

h1{
    color:#08794a;
    margin-bottom:15px;
}

.macbook{
    width:100%;
    border-radius:20px;
    margin:15px 0;
}

.price{
    font-size:28px;
    font-weight:bold;
    color:#00a86b;
    margin-bottom:20px;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:15px;
}

button{
    border:none;
    padding:12px 25px;
    border-radius:50px;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

.buy{
    background:#ffffff;
    color:white;
}

.buy:hover{
    transform:scale(1.1);
}

.no{
    background:#ddd;
}

.result{
    margin-top:25px;
    font-size:24px;
    font-weight:bold;
    color:#080101;
    
}

.heart{
    position:fixed;
    font-size:30px;
    pointer-events:none;
    animation:floatUp 3s linear forwards;
    z-index:9999;
}

@keyframes floatUp{
  0%{
        transform:translateY(0) scale(1);
        opacity:1;
    }100%{
        transform:translateY(-300px) scale(1.8);
        opacity:0;
    }
}
</style>
    <!-- หน้าแรก -->
    <div id="mainPage" class="container">
      <span class="title">วันนี้ขอนำเสนอ 13-inch MacBook Air</span>
      <img id="mainImage" src="mac.png" alt="Do you?" />
      
    <div class="price">
        MacBook Air M5 16GB 512✨<br>
        ราคา 33,900 บาท
    </div>

      <!-- ปุ่มกด -->
      <div class="button-container">
        <button
          id="noButton"
          class="button"
          onmouseover="changeImage('hm.png')"
          onmouseout="resetImage()"
          onclick="handleNoClick()"
        >
          ไม่
        </button>
        <button
          id="loveButton"
          class="button"
          onmouseover="changeImage('pinkping.png')"
          onmouseout="resetImage()"
          onclick="showPage('lovePage')"
        >
          BuyMacbook
        </button>
      </div>
    </div>

    <!-- หน้ากด buy macbook -->
    <div id="lovePage" class="container hidden">
      <h1>แงง เค้ารักเบเบี๋ที่สุดเลยย</h1>
      <img src="loveu.png" alt="Love You" />
    </div>

    <!-- หน้าถ้ายังจะกด No เรื่อยๆ  -->
    <div id="noPage" class="container hidden">
      <img src="die.png" alt="Die" />
    </div>

    <script src="script.js">
      function "BuyMacbook"(){

    for(let i=0;i<40;i++){

        const heart =
            document.createElement("div");

        heart.className = "heart";
        heart.innerHTML = "💖";

        heart.style.left =
            Math.random()*window.innerWidth + "px";

        heart.style.top =
            window.innerHeight + "px";

        document.body.appendChild(heart);

        setTimeout(()=>{
            heart.remove();
        },3000);
    }

    setTimeout(()=>{
        showPage("lovePage");
    },1500);
}
    </script>
  </body>
</html>
